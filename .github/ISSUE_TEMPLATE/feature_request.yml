name: 💡 功能建议
description: 提一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题 / 场景
      description: 这个功能想解决什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的效果
      description: 你希望它怎么工作？有参考案例更好。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      required: false
